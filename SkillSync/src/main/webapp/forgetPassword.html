<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <style>
    /* Background Styling */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #6dd5fa, #2980b9);
      background-attachment: fixed;
      position: relative;
      overflow: hidden;
    }

    /* Watery ripple effect */
    body::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 1%, transparent 60%);
      animation: ripple 10s infinite linear;
    }

    @keyframes ripple {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    /* Card Styling */
    .container {
      z-index: 1;
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0px 15px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 350px;
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .container h2 {
      margin-bottom: 10px;
      color: #2c3e50;
      font-size: 26px;
      font-weight: bold;
    }

    .container p {
      font-size: 14px;
      color: #555;
      margin-bottom: 25px;
    }

    /* Input Field */
    .input-box {
      margin-bottom: 20px;
      position: relative;
    }

    .input-box input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #dfe6e9;
      border-radius: 12px;
      outline: none;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .input-box input:focus {
      border-color: #2980b9;
      box-shadow: 0px 0px 8px rgba(41, 128, 185, 0.4);
    }

    /* Button */
    .btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #6dd5fa, #2980b9);
      border: none;
      padding: 12px;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: linear-gradient(135deg, #2980b9, #6dd5fa);
      transform: scale(1.03);
    }

    /* Back to login */
    .back-link {
      margin-top: 20px;
      font-size: 14px;
    }

    .back-link a {
      text-decoration: none;
      color: #2980b9;
      font-weight: bold;
      transition: 0.3s;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Forgot Password?</h2>
    <p>Enter your registered email address. We’ll send you a link to reset your password.</p>
    <form action="reset_password" method="post">
      <div class="input-box">
        <input type="email" name="email" placeholder="Enter your email" required>
      </div>
      <button type="submit" class="btn">Send Reset Link</button>
    </form>
    <div class="back-link">
      <a href="login.html">← Back to Login</a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Form</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(to bottom right, #dff3ff, #bfe7ff);
        font-family: 'Poppins', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .container {
        width: 90%;
        max-width: 1100px;
        height: 90vh;
        background: white;
        border-radius: 20px;
        padding: 30px;
        overflow-y: scroll;
        box-shadow: 0px 0px 25px rgba(0,0,0,0.15);
        animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #0077b6;
        font-size: 28px;
        font-weight: 600;
    }

    .form-group {
        width: 100%;
        margin-bottom: 18px;
    }

    label {
        font-weight: 600;
        color: #004c70;
        margin-bottom: 6px;
        display: block;
    }

    input, select, textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #b6dff5;
        border-radius: 12px;
        outline: none;
        font-size: 15px;
        background: #f5fbff;
        transition: 0.3s;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #0096c7;
        box-shadow: 0 0 10px rgba(0,150,199,0.3);
    }

    textarea {
        resize: none;
        height: 80px;
    }

    .row {
        display: flex;
        gap: 20px;
    }

    .row .form-group {
        flex: 1;
    }

    .profile-box {
        border: 2px dashed #9ed9ff;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        background: #e8f7ff;
    }

    .submit-btn {
        width: 100%;
        padding: 15px;
        background: #0096c7;
        border: none;
        color: white;
        font-size: 18px;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.3s;
    }

    .submit-btn:hover {
        background: #0077b6;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Registration Form</h2>
<form action="registeruser" method="post" enctype="multipart/form-data">

    <!--  <div class="form-group profile-box">
        <label>Upload Profile Image</label>
        <input type="file" name="profile_image">
    </div>-->
    
    <div class="form-group profile-box">
        <label>Upload Profile Image (JPG / PNG)</label>
        <input type="file" name="profile_image" accept=".jpg, .jpeg, .png" required>
    </div>

    <div class="row">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter full name" required name="fullname">
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" placeholder="Choose a username" required name="username">
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter email" required name="email">
        </div>
        <div class="form-group">
            <label>Whatsapp Number</label>
            <input type="text" placeholder="Enter WhatsApp number" required name="whatsapp">
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label>City</label>
            <input type="text" placeholder="Enter city" required name="city">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select required name="gender">
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Role</label>
        <select required name="role">
            <option>Teacher</option>
            <option>Learner</option>
            <option>Both</option>
        </select>
    </div>

    <h3 style="color:#0077b6">Student Information</h3>

    <div class="row">
        <div class="form-group">
            <label>College</label>
            <input type="text" required name="college">
        </div>
        <div class="form-group">
            <label>Degree</label>
            <select name="degree" required>
    <option value="B.Tech">B.Tech</option>
</select>
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label>Branch</label>
            <input type="text" required name="branch">
        </div>
        <div class="form-group">
            <label>Semester</label>
            <input type="text" required name="semester">
        </div>
    </div>

    <h3 style="color:#0077b6">Skills & Courses</h3>

    <div class="form-group">
        <label>Main Skill</label>
        <input type="text" placeholder="Your main skill" required name="main_skill">
    </div>

    <div class="form-group">
        <label>Other Skills</label>
        <input type="text" placeholder="List your skills" required name="skills">
    </div>

    <div class="form-group">
        <label>Current Projects</label>
        <textarea placeholder="Describe your projects" required name="current_project"></textarea>
    </div>

    <div class="form-group">
        <label>Courses Interested to Teach / Learn</label>
        <input type="text" placeholder="Enter course names" required name="course_interest">
    </div>

    <div class="row">
        <div class="form-group">
            <label>Course Fees</label>
            <select required name="fee_type">
                <option>Free</option>
                <option>Paid</option>
            </select>
        </div>

        <div class="form-group">
            <label>Price (If Paid)</label>
            <input type="text" placeholder="Enter amount" required name="fee_amount">
        </div>
    </div>

    <div class="form-group">
        <label>Course Level</label>
        <select required name="course_level">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
        </select>
    </div>

    <h3 style="color:#0077b6">Account Security</h3>

    <div class="row">
        <div class="form-group">
            <label>Password</label>
            <input type="password" required name="password">
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" required name="confirm_password">
        </div>
    </div>

    <button type="submit" class="submit-btn">Register</button>

</div>

</body>
</html>

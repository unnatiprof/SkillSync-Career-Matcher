<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSync Login</title>
<style>
/* Reset */
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
	background: #4a90e2; 
	/*linear-gradient(135deg, #4a90e2, #50c9c3);*/
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
}

.login-container {
	background: #fff;
	width: 1300px;
	height: 600px;
	padding: 40px 30px;
	border-radius: 15px;
	box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
	text-align: center;
}

.login-container h2 {
	margin-bottom: 10px;
	font-size: 26px;
	color: #333;
}

.login-container p {
	margin-bottom: 25px;
	color: #666;
	font-size: 14px;
}

.form-group {
	margin-bottom: 20px;
	text-align: left;
}

.form-group label {
	display: block;
	font-size: 14px;
	margin-bottom: 5px;
	color: #444;
}

.form-group input {
	width: 100%;
	padding: 12px 15px;
	border: 1px solid #ccc;
	border-radius: 8px;
	font-size: 14px;
	outline: none;
	transition: 0.3s;
}

.form-group input:focus {
	border-color: #4a90e2;
	box-shadow: 0 0 6px rgba(74, 144, 226, 0.3);
}

.login-btn {
	width: 100%;
	background: #4a90e2;
	color: #fff;
	padding: 12px;
	border: none;
	border-radius: 8px;
	font-size: 16px;
	cursor: pointer;
	transition: 0.3s;
}

.login-btn:hover {
	background: #357ABD;
}

.options {
	margin-top: 20px;
	font-size: 14px;
	color: #555;
}

.options a {
	color: #4a90e2;
	text-decoration: none;
	margin: 0 5px;
	font-weight: 500;
}

.options a:hover {
	text-decoration: underline;
}

.social-login {
	margin-top: 25px;
}

.social-login p {
	margin-bottom: 10px;
	font-size: 14px;
	color: #555;
}

.social-buttons {
	display: flex;
	justify-content: center;
	gap: 15px;
}

.social-buttons button {
	border: none;
	padding: 10px 15px;
	border-radius: 8px;
	cursor: pointer;
	font-size: 14px;
	display: flex;
	align-items: center;
	gap: 8px;
	transition: 0.3s;
}

.google {
	background: #fff;
	border: 1px solid #ccc;
}

.google:hover {
	background: #f1f1f1;
}

.facebook {
	background: #3b5998;
	color: #fff;
}

.facebook:hover {
	background: #2d4373;
}
</style>
</head>
<body>
	<div class="login-container">
		<h2>Welcome Back</h2>
		<p>Login to SkillSync and continue learning</p>

		<form action="login" method="post">
			<div class="form-group">
				<label for="username">Username</label> <input type="username"
					id="username" placeholder="Enter your username" required name="username">
			</div>

			<div class="form-group">
				<label for="password">Password</label> <input type="password"
					id="password" placeholder="Enter your password" required name="password">
			</div>

			<button type="submit" class="login-btn">Login</button>
		</form>

		<div class="options">
			<p>
				Don’t have an account? <a href="registeruser.html">Sign Up</a>
			</p>
			<p>
				<a href="forgetPassword.html">Forgot Password?</a>
			</p>
		</div>

		<div class="social-login">
			<p>Or login with</p>
			<div class="social-buttons">
				<a href="https://accounts.google.com/signin" target="_blank">
					<button type="button" class="google">🌐 Google</button>
				</a>

				<a href="https://www.facebook.com/login.php" target="_blank">
					<button type="button" class="facebook">📘 Facebook</button>
				</a>
				
			</div>
		</div>
	</div>
</body>
</html>

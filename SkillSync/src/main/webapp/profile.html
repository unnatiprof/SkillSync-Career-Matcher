<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #eaf3ff, #f8fbff);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .profile-container {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 600px;
      animation: fadeInUp 0.8s ease-in-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .profile-header h2 {
      font-size: 28px;
      font-weight: 700;
      color: #222;
    }

    .logout-btn {
      padding: 10px 18px;
      border: none;
      background: #2a62f4;
      color: white;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .logout-btn:hover {
      background: #1a4ed8;
      transform: scale(1.05);
    }

    .profile-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 30px;
    }

    .profile-info label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
    }

    .profile-info input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 15px;
      background: #f9f9f9;
      transition: all 0.3s ease;
    }

    .profile-info input:focus {
      border-color: #2a62f4;
      outline: none;
      background: #fff;
      box-shadow: 0 0 6px rgba(42, 98, 244, 0.3);
    }

    .footer-btn {
      margin-top: 30px;
      text-align: center;
    }

    .footer-btn button {
      background: #2a62f4;
      color: #fff;
      font-size: 16px;
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .footer-btn button:hover {
      background: #1a4ed8;
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(42, 98, 244, 0.3);
    }
  </style>
</head>
<body>
  <div class="profile-container">
    <div class="profile-header">
      <h2>Profile</h2>
      <button class="logout-btn">Logout</button>
    </div>

    <div class="profile-info">
      <div>
        <label>Full Name</label>
        <input type="text" value="John Doe" readonly>
      </div>
      <div>
        <label>College</label>
        <input type="text" value="University of Example" readonly>
      </div>
      <div>
        <label>Email</label>
        <input type="text" value="john.doe@example.com" readonly>
      </div>
      <div>
        <label>Degree</label>
        <input type="text" value="B.Sc. in Computer Science" readonly>
      </div>
      <div>
        <label>Whatsapp No</label>
        <input type="text" value="1234567890" readonly>
      </div>
      <div>
        <label>Starting Date</label>
        <input type="text" value="01/2015" readonly>
      </div>
      <div>
        <label>Skills</label>
        <input type="text" value="Web Development" readonly>
      </div>
      <div>
        <label>Ending Date</label>
        <input type="text" value="12/2019" readonly>
      </div>
    </div>

    <div class="footer-btn">
      <button>Return to Dashboard</button>
    </div>
  </div>
</body>
</html>
